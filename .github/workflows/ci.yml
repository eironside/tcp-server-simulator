name: ci

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  setup-validation:
    name: setup-validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run preflight
        run: python scripts/preflight.py

  unit:
    runs-on: ubuntu-latest
    needs: setup-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: pytest -m unit -q --maxfail=1

  integration:
    runs-on: ubuntu-latest
    needs: unit
    env:
      TM_INT_01_CONNECTION_ROUNDS: "120"
      TM_INT_01_MAX_ELAPSED_SECONDS: "60"
      TM_INT_02_FLAP_CYCLES: "20"
      TM_INT_02_MIN_RECONNECT_EVENTS: "15"
      TM_INT_03_BROADCAST_ITERATIONS: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run integration tests
        run: pytest -m integration -q --maxfail=1

  soak-baseline:
    runs-on: ubuntu-latest
    needs: integration
    env:
      TM_SOAK_01_DURATION_SECONDS: "45"
      TM_SOAK_01_MIN_PASSES: "2"
      TM_SOAK_02_DURATION_SECONDS: "45"
      TM_SOAK_02_UNIQUE_SENDERS: "2000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run soak baseline tests
        run: pytest -m soak -q --maxfail=1

  soak-full-release:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    needs: integration
    env:
      TM_SOAK_01_DURATION_SECONDS: "1800"
      TM_SOAK_02_DURATION_SECONDS: "1800"
      TM_SOAK_02_UNIQUE_SENDERS: "2000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run soak full-profile tests
        run: pytest -m soak -q --maxfail=1
